<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Archy.js</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
<style>
  :root {
    --base:    #1e1e2e;
    --mantle:  #181825;
    --crust:   #11111b;
    --surface0:#313244;
    --surface1:#45475a;
    --surface2:#585b70;
    --overlay0:#6c7086;
    --overlay1:#7f849c;
    --overlay2:#9399b2;
    --subtext0:#a6adc8;
    --subtext1:#bac2de;
    --text:    #cdd6f4;
    --lavender:#b4befe;
    --blue:    #89b4fa;
    --sapphire:#74c7ec;
    --sky:     #89dceb;
    --teal:    #94e2d5;
    --green:   #a6e3a1;
    --yellow:  #f9e2af;
    --peach:   #fab387;
    --maroon:  #eba0ac;
    --red:     #f38ba8;
    --mauve:   #cba6f7;
    --pink:    #f5c2e7;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: 'JetBrains Mono', monospace;
    background: var(--crust);
  }

  #bg-canvas {
    position: fixed;
    inset: 0;
    z-index: 0;
  }

  /* ══ LOGIN ══ */
  #login-screen {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .login-clock {
    position: fixed;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    pointer-events: none;
    user-select: none;
  }
  .login-clock .time {
    font-size: 72px;
    font-weight: 100;
    color: var(--text);
    letter-spacing: -3px;
    line-height: 1;
    text-shadow: 0 0 40px rgba(137,180,250,0.2);
  }
  .login-clock .date-str {
    font-size: 12px;
    color: var(--overlay1);
    letter-spacing: 0.12em;
    margin-top: 8px;
    text-transform: uppercase;
  }

  .login-box {
    background: rgba(24,24,37,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border: 1px solid rgba(137,180,250,0.12);
    border-radius: 16px;
    padding: 44px 48px 36px;
    width: 360px;
    box-shadow:
      0 0 0 1px rgba(137,180,250,0.06),
      0 40px 100px rgba(0,0,0,0.75),
      inset 0 1px 0 rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 24px;
  }

  .login-logo {
    color: var(--blue);
    font-size: 10.5px;
    line-height: 1.3;
    white-space: pre;
    text-align: center;
    text-shadow: 0 0 24px rgba(137,180,250,0.5);
  }

  .login-title { text-align: center; }
  .login-title h1 {
    font-size: 17px;
    font-weight: 600;
    color: var(--text);
    letter-spacing: 0.06em;
    margin-bottom: 5px;
  }
  .login-title p {
    font-size: 11px;
    color: var(--overlay1);
    letter-spacing: 0.04em;
  }

  .login-fields { width: 100%; display: flex; flex-direction: column; gap: 12px; }

  .field-label {
    font-size: 10px;
    color: var(--overlay0);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 5px;
    display: block;
  }

  .login-input {
    width: 100%;
    background: rgba(17,17,27,0.8);
    border: 1px solid var(--surface1);
    border-radius: 8px;
    padding: 10px 13px;
    color: var(--text);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
    caret-color: var(--blue);
  }
  .login-input:focus {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(137,180,250,0.1);
  }
  .login-input::placeholder { color: var(--overlay0); }

  .login-error {
    font-size: 11px;
    color: var(--red);
    text-align: center;
    min-height: 14px;
    letter-spacing: 0.02em;
  }

  .login-btn {
    width: 100%;
    background: var(--blue);
    color: var(--crust);
    border: none;
    border-radius: 8px;
    padding: 11px 0;
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: opacity 0.15s, transform 0.1s, box-shadow 0.15s;
    margin-top: 2px;
    box-shadow: 0 4px 20px rgba(137,180,250,0.25);
  }
  .login-btn:hover  { opacity: 0.92; box-shadow: 0 4px 28px rgba(137,180,250,0.38); }
  .login-btn:active { transform: scale(0.98); }
  .login-btn:disabled { opacity: 0.6; cursor: default; }

  .login-hint {
    font-size: 10px;
    color: var(--overlay0);
    text-align: center;
    letter-spacing: 0.03em;
  }
  .login-hint span { color: var(--overlay2); }

  /* ══ TERMINAL ══ */
  #terminal-screen {
    position: fixed;
    inset: 0;
    z-index: 5;
    display: none;
    flex-direction: column;
  }

  .titlebar {
    background: rgba(24,24,37,0.97);
    padding: 0 16px;
    height: 38px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
    border-bottom: 1px solid var(--surface0);
    user-select: none;
    position: relative;
    z-index: 1;
  }

  .dot { width:12px; height:12px; border-radius:50%; cursor:pointer; transition:filter 0.15s; flex-shrink:0; }
  .dot:hover { filter:brightness(1.3); }
  .dot.close { background:#ff5f57; }
  .dot.min   { background:#ffbd2e; }
  .dot.max   { background:#28c840; }

  .title-text {
    flex: 1;
    text-align: center;
    font-size: 12px;
    color: var(--overlay1);
    letter-spacing: 0.03em;
  }

  .terminal-body {
    flex: 1;
    background: rgba(30,30,46,0.96);
    overflow-y: auto;
    padding: 14px 22px 8px;
    cursor: text;
    scroll-behavior: smooth;
  }

  .terminal-body::-webkit-scrollbar { width: 5px; }
  .terminal-body::-webkit-scrollbar-track { background: transparent; }
  .terminal-body::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 3px; }

  .output-block {
    margin-bottom: 1px;
    white-space: pre-wrap;
    word-break: break-all;
    line-height: 1.6;
    font-size: 13.5px;
    color: var(--text);
  }
  .output-block.error { color: var(--red); }
  .boot-line { color: var(--overlay0); font-size: 12.5px; line-height: 1.6; }
  .boot-ok   { color: var(--green);    font-size: 12.5px; line-height: 1.6; }

  .prompt-line { display:flex; align-items:flex-start; min-height:22px; margin:1px 0; }

  .prompt-user   { color: var(--green); }
  .prompt-at     { color: var(--overlay2); }
  .prompt-host   { color: var(--blue); }
  .prompt-colon  { color: var(--overlay2); }
  .prompt-path   { color: var(--mauve); }
  .prompt-dollar { color: var(--peach); }
  .prompt-sudo   { color: var(--red); }

  .input-row {
    display: flex;
    align-items: center;
    padding: 4px 22px 14px;
    flex-shrink: 0;
    background: rgba(30,30,46,0.96);
  }

  .input-prompt { white-space:nowrap; flex-shrink:0; font-size:13.5px; line-height:1.6; }

  .input-field {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: inherit;
    font-size: 13.5px;
    line-height: 1.6;
    caret-color: var(--blue);
    padding: 0;
  }

  .ls-dir  { color:var(--blue); font-weight:600; }
  .ls-file { color:var(--text); }
  .ls-exec { color:var(--green); font-weight:600; }

  ::selection { background:var(--surface1); color:var(--text); }
  .terminal-body { scrollbar-gutter: stable; }

  @keyframes fadeOut { to { opacity:0; pointer-events:none; } }
  @keyframes fadeIn  { from { opacity:0; } to { opacity:1; } }
  .fade-out { animation: fadeOut 0.45s ease forwards; }
  .fade-in  { animation: fadeIn  0.45s ease forwards; }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-clock">
    <div class="time" id="clock-time">00:00</div>
    <div class="date-str" id="clock-date"></div>
  </div>

  <div class="login-box">
    <div class="login-logo" id="login-logo"></div>

    <div class="login-title">
      <h1>Archy.js</h1>
      <p>Arch Linux 6.9.3-arch1-1 — Archy.js</p>
    </div>

    <div class="login-fields">
      <div>
        <label class="field-label">Username</label>
        <input class="login-input" id="login-user" type="text" value="user" autocomplete="off" spellcheck="false" placeholder="username">
      </div>
      <div>
        <label class="field-label">Password</label>
        <input class="login-input" id="login-pass" type="password" autocomplete="off" placeholder="password">
      </div>
      <div class="login-error" id="login-error"></div>
      <button class="login-btn" id="login-btn">LOGIN</button>
    </div>

    <div class="login-hint">username: <span>user</span> &nbsp;·&nbsp; password: <span>user</span></div>
  </div>
</div>

<!-- TERMINAL -->
<div id="terminal-screen">
  <div class="titlebar">
    <div class="dot close"></div>
    <div class="dot min"></div>
    <div class="dot max"></div>
    <span class="title-text">user@archbox — Archy.js</span>
  </div>
  <div class="terminal-body" id="terminal"></div>
  <div class="input-row" id="input-row">
    <span class="input-prompt" id="input-prompt"></span>
    <input type="text" class="input-field" id="input-field" autocomplete="off" spellcheck="false" disabled>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════
   CONNECTED DOTS CANVAS
═══════════════════════════════════════════ */
(function(){
  const canvas = document.getElementById('bg-canvas');
  const ctx = canvas.getContext('2d');
  const N = 85, MAX = 145;
  let W, H, dots = [];

  function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }

  function mkDot(){ return { x:Math.random()*W, y:Math.random()*H, vx:(Math.random()-.5)*.45, vy:(Math.random()-.5)*.45, r:Math.random()*1.4+.8 }; }

  let mx=-9999,my=-9999;
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;});

  function frame(){
    ctx.clearRect(0,0,W,H);
    for(const d of dots){
      d.x+=d.vx; d.y+=d.vy;
      if(d.x<0)d.x=W; if(d.x>W)d.x=0;
      if(d.y<0)d.y=H; if(d.y>H)d.y=0;
    }
    for(let i=0;i<dots.length;i++){
      for(let j=i+1;j<dots.length;j++){
        const dx=dots[i].x-dots[j].x, dy=dots[i].y-dots[j].y;
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist<MAX){
          ctx.strokeStyle=`rgba(137,180,250,${(1-dist/MAX)*.16})`;
          ctx.lineWidth=.8;
          ctx.beginPath(); ctx.moveTo(dots[i].x,dots[i].y); ctx.lineTo(dots[j].x,dots[j].y); ctx.stroke();
        }
      }
      const dx=dots[i].x-mx, dy=dots[i].y-my, md=Math.sqrt(dx*dx+dy*dy);
      if(md<190){
        ctx.strokeStyle=`rgba(137,180,250,${(1-md/190)*.32})`;
        ctx.lineWidth=1;
        ctx.beginPath(); ctx.moveTo(dots[i].x,dots[i].y); ctx.lineTo(mx,my); ctx.stroke();
      }
    }
    for(const d of dots){
      ctx.fillStyle='rgba(137,180,250,0.5)';
      ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
    }
    requestAnimationFrame(frame);
  }

  addEventListener('resize',()=>{ resize(); });
  resize();
  dots = Array.from({length:N},mkDot);
  frame();
})();

/* ═══════════════════════════════════════════
   CLOCK
═══════════════════════════════════════════ */
function updateClock(){
  const n=new Date();
  document.getElementById('clock-time').textContent=
    String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
  const days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clock-date').textContent=
    days[n.getDay()]+', '+months[n.getMonth()]+' '+n.getDate();
}
updateClock();
setInterval(updateClock,15000);

/* ═══════════════════════════════════════════
   LOGIN LOGO
═══════════════════════════════════════════ */
document.getElementById('login-logo').textContent=
`      /\\
     /  \\
    /\\   \\
   /  \\   \\
  / .  \\ . \\
 /   .  \\   \\
/________\\___\\`;

/* ═══════════════════════════════════════════
   LOGIN
═══════════════════════════════════════════ */
const loginScreen = document.getElementById('login-screen');
const termScreen  = document.getElementById('terminal-screen');
const loginBtn    = document.getElementById('login-btn');
const loginUser   = document.getElementById('login-user');
const loginPass   = document.getElementById('login-pass');
const loginError  = document.getElementById('login-error');

function attemptLogin(){
  const u = loginUser.value.trim();
  const p = loginPass.value;
  if(u==='user' && p==='user'){
    loginError.textContent='';
    loginBtn.textContent='Authenticating...';
    loginBtn.disabled=true;
    setTimeout(()=>{
      loginScreen.classList.add('fade-out');
      termScreen.style.display='flex';
      termScreen.classList.add('fade-in');
      setTimeout(()=>{ loginScreen.style.display='none'; },450);
      bootSequence();
    },500);
  } else {
    loginError.textContent = u!=='user' ? `User "${u}" not found.` : 'Incorrect password.';
    loginPass.value='';
    loginPass.focus();
    loginBtn.disabled=false;
    loginBtn.textContent='LOGIN';
  }
}

loginBtn.addEventListener('click', attemptLogin);
loginPass.addEventListener('keydown', e=>{ if(e.key==='Enter') attemptLogin(); });
loginUser.addEventListener('keydown', e=>{ if(e.key==='Enter') loginPass.focus(); });
window.addEventListener('load', ()=> loginPass.focus());

/* ═══════════════════════════════════════════
   TERMINAL STATE
═══════════════════════════════════════════ */
const STATE = {
  user:'user', hostname:'archbox',
  currentPath:['home','user'],
  history:[], historyIndex:-1,
  fileSystem:buildInitialFS(),
  sudoAuthenticated:false, sudoTimeout:null,
  env:{ HOME:'/home/user',SHELL:'/bin/bash',EDITOR:'nvim',TERM:'xterm-256color',LANG:'en_US.UTF-8' },
  installedPackages:['base','linux','linux-firmware','networkmanager','bash','neofetch','git','neovim','hyprland','kitty','firefox','nodejs','npm','python','rustup','go','htop','curl','wget','unzip','tar','which','sudo','man-db','pacman','zsh','tmux','ripgrep','fd','bat','exa','fzf','starship'],
  pendingSudo:null, awaitingPassword:false,
};

function buildInitialFS(){
  return { type:'dir', children:{
    home:{ type:'dir', children:{ user:{ type:'dir', children:{
      '.bashrc':{ type:'file', content:"# ~/.bashrc\nexport PS1='[\\u@\\h \\W]\\$ '\nexport EDITOR=nvim\nexport PATH=$PATH:~/.local/bin\nalias ls='ls --color=auto'\nalias ll='ls -la'", size:145, modified:'Jun 14 09:22' },
      '.bash_history':{ type:'file', content:'sudo pacman -Syu\nneofetch\ncd Projects\nls -la\nnvim config.ts', size:52, modified:'Jun 14 11:03' },
      '.config':{ type:'dir', children:{
        hypr:{ type:'dir', children:{ 'hyprland.conf':{ type:'file', content:'# Hyprland config\nmonitor=,2560x1600@120,auto,1', size:4096, modified:'Jun 10 14:30' }}},
        kitty:{ type:'dir', children:{ 'kitty.conf':{ type:'file', content:'font_family JetBrains Mono\nfont_size 13.0\nbackground #1e1e2e', size:512, modified:'Jun 12 08:15' }}},
        nvim:{ type:'dir', children:{ 'init.lua':{ type:'file', content:'-- Neovim config\nvim.opt.number = true\nvim.opt.relativenumber = true', size:256, modified:'Jun 11 22:40' }}},
      }},
      Projects:{ type:'dir', children:{ 'README.md':{ type:'file', content:'# Projects\nPersonal development workspace.', size:42, modified:'Jun 13 16:44' }}},
      Documents:{ type:'dir', children:{} },
      Downloads:{ type:'dir', children:{} },
      Pictures:{ type:'dir', children:{} },
    }}}},
    etc:{ type:'dir', children:{
      'os-release':{ type:'file', content:'NAME="Arch Linux"\nPRETTY_NAME="Arch Linux"\nID=arch\nBUILD_ID=rolling', size:234, modified:'Jun 01 00:00' },
      hostname:{ type:'file', content:'archbox', size:8, modified:'Jun 01 00:00' },
      'pacman.conf':{ type:'file', content:'[options]\nHoldPkg = pacman glibc\nArchitecture = auto\nCheckSpace\nParallelDownloads = 5\n\n[core]\nInclude = /etc/pacman.d/mirrorlist\n\n[extra]\nInclude = /etc/pacman.d/mirrorlist', size:1024, modified:'Jun 01 00:00' },
      fstab:{ type:'file', content:'# /etc/fstab\n/dev/nvme0n1p2   /      ext4  defaults  0 1\n/dev/nvme0n1p1   /boot  vfat  umask=0077 0 2', size:256, modified:'Jun 01 00:00' },
    }},
    usr:{ type:'dir', children:{ bin:{ type:'dir', children:{} }, lib:{ type:'dir', children:{} }}},
    var:{ type:'dir', children:{ log:{ type:'dir', children:{ 'pacman.log':{ type:'file', content:'[2024-06-14 09:15] [PACMAN] Running \'pacman -Syu\'\n[2024-06-14 09:16] [ALPM] upgraded linux (6.9.2-1 -> 6.9.3-1)', size:2048, modified:'Jun 14 09:16' }}}}},
    tmp:{ type:'dir', children:{} }, proc:{ type:'dir', children:{} }, dev:{ type:'dir', children:{} },
  }};
}

/* ═══════════════════════════════════════════
   DOM REFS
═══════════════════════════════════════════ */
const termEl      = document.getElementById('terminal');
const inputField  = document.getElementById('input-field');
const inputPrompt = document.getElementById('input-prompt');
const inputRow    = document.getElementById('input-row');

/* ═══════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════ */
function getNode(path){ let n=STATE.fileSystem; for(const s of path){ if(!n.children?.[s]) return null; n=n.children[s]; } return n; }

function formatPath(p){
  const full='/'+p.join('/');
  const home='/home/user';
  return full.startsWith(home)?'~'+full.slice(home.length):full;
}

function resolvePath(t){
  if(!t||t==='.') return [...STATE.currentPath];
  if(t==='~') return ['home','user'];
  let parts;
  if(t.startsWith('/')) parts=t.split('/').filter(Boolean);
  else if(t.startsWith('~/')) parts=['home','user',...t.slice(2).split('/').filter(Boolean)];
  else parts=[...STATE.currentPath,...t.split('/').filter(Boolean)];
  const r=[];
  for(const p of parts){ if(p==='..') r.pop(); else if(p!=='.') r.push(p); }
  return r;
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function promptHTML(sudo=false){
  const path=formatPath(STATE.currentPath);
  if(sudo) return `<span class="prompt-sudo">[sudo]</span><span style="color:var(--overlay2)"> password for </span><span class="prompt-user">${STATE.user}</span><span class="prompt-dollar">: </span>`;
  return `<span class="prompt-user">${STATE.user}</span><span class="prompt-at">@</span><span class="prompt-host">${STATE.hostname}</span><span class="prompt-colon">:</span><span class="prompt-path">${path}</span><span class="prompt-dollar"> $ </span>`;
}

function updateInputPrompt(){
  inputPrompt.innerHTML=promptHTML(STATE.awaitingPassword);
  inputField.type=STATE.awaitingPassword?'password':'text';
}

function appendLine(content, cls='', isHtml=false){
  const d=document.createElement('div');
  d.className='output-block'+(cls?' '+cls:'');
  if(isHtml) d.innerHTML=content; else d.textContent=content;
  termEl.appendChild(d); scrollBottom();
}

function appendPromptLine(cmd, sudo=false){
  const d=document.createElement('div');
  d.className='prompt-line';
  d.innerHTML=promptHTML(sudo)+`<span class="output-block" style="display:inline;margin:0">${sudo?'········':esc(cmd)}</span>`;
  termEl.appendChild(d); scrollBottom();
}

function scrollBottom(){ termEl.scrollTop=termEl.scrollHeight; }
function clearTerminal(){ termEl.innerHTML=''; }
function delay(ms){ return new Promise(r=>setTimeout(r,ms)); }

/* ═══════════════════════════════════════════
   BOOT
═══════════════════════════════════════════ */
let BOOTING=true;

async function bootSequence(){
  inputRow.style.display='none';
  const lines=[
    ['[  OK  ] Started udev Kernel Device Manager.','boot-ok'],
    ['[  OK  ] Started D-Bus System Message Bus.','boot-ok'],
    ['[  OK  ] Mounted /boot/efi.','boot-ok'],
    ['[  OK  ] Started Network Manager.','boot-ok'],
    ['[  OK  ] Reached target Network.','boot-ok'],
    ['[  OK  ] Started Login Service.','boot-ok'],
    ['','boot-line'],
    ['Arch Linux 6.9.3-arch1-1 (tty1)','boot-line'],
    ['','boot-line'],
    ['archbox login: user','boot-line'],
    ['Password: ········','boot-line'],
    ['','boot-line'],
    [`Last login: ${new Date().toDateString()} on tty1`,'boot-line'],
    ['','boot-line'],
  ];
  for(const [text,cls] of lines){
    await delay(50+Math.random()*70);
    const d=document.createElement('div');
    d.className='output-block '+cls;
    d.textContent=text;
    termEl.appendChild(d); scrollBottom();
  }
  inputRow.style.display='flex';
  updateInputPrompt();
  inputField.disabled=false;
  BOOTING=false;
  inputField.focus();
}

/* ═══════════════════════════════════════════
   NEOFETCH
═══════════════════════════════════════════ */
const ASCII=[
  `                   -\``,`                  .o+\``,`                 \`ooo/`,
  `                \`+oooo:`,`               \`+oooooo:`,`               -+oooooo+:`,
  `             \`/:-:++oooo+:`,`            \`/++++/+++++++:`,`           \`/++++++++++++++:`,

function lsFormat(children, longFmt, showHidden){
  const entries=Object.entries(children).filter(([n])=>showHidden||!n.startsWith('.'));
  if(!longFmt) return entries.map(([n,nd])=>{
    if(nd.type==='dir') return `<span class="ls-dir">${esc(n)}</span>`;
    if(/\.(sh|bash|py)$/.test(n)) return `<span class="ls-exec">${esc(n)}</span>`;
    return `<span class="ls-file">${esc(n)}</span>`;
  }).join('  ');
  const lines=[`total ${entries.length*8}`];
  for(const [n,nd] of entries){
    const perms=nd.type==='dir'?'drwxr-xr-x':'-rw-r--r--';
    const sz=String(nd.size??(nd.type==='dir'?4096:0)).padStart(6);
    const mod=nd.modified??'Jun 14 10:00';
    const disp=nd.type==='dir'?`<span class="ls-dir">${esc(n)}</span>`:`<span class="ls-file">${esc(n)}</span>`;
    lines.push(`${perms}  1 user user  ${sz}  ${mod}  ${disp}`);
  }
  return lines.join('\n');
}

function cmdSystemctl(args, isSudo){
  const action=args[0]; const svc=args[1];
  if(!action) return { output:'usage: systemctl [start|stop|enable|disable|status|restart] <service>' };
  if(action==='status'&&svc) return { output:`● ${svc}.service\n   Loaded: loaded (/usr/lib/systemd/system/${svc}.service; enabled)\n   Active: active (running) since Sat 2024-06-14 09:00:00 UTC; 3h 42min ago\n Main PID: 1234 (${svc})\n   CGroup: /system.slice/${svc}.service\n           └─1234 /usr/bin/${svc}` };
  if(['start','stop','restart','enable','disable'].includes(action)){
    if(!isSudo) return { output:`Failed to ${action} ${svc??'?'}.service: Interactive authentication required.`,isError:true };
    return { output:``, delay:300 };
  }
  return { output:`Unknown operation '${action}'.`,isError:true };
}

function cmdPing(args){
  const host=args.find(a=>!a.startsWith('-'))||'localhost';
  const count=parseInt(args[args.indexOf('-c')+1])||4;
  let out=`PING ${host} (${host==='localhost'?'127.0.0.1':'93.184.216.34'}): 56 data bytes\n`;
  for(let i=0;i<Math.min(count,4);i++) out+=`64 bytes from ${host==='localhost'?'127.0.0.1':'93.184.216.34'}: icmp_seq=${i} ttl=64 time=${(Math.random()*5+0.5).toFixed(3)} ms\n`;
  out+=`\n--- ${host} ping statistics ---\n${Math.min(count,4)} packets transmitted, ${Math.min(count,4)} received, 0% packet loss\nrtt min/avg/max/mdev = 0.512/1.823/4.211/1.204 ms`;
  return { output:out, delay:Math.min(count,4)*250 };
}

function cmdCurl(args){
  const url=args.find(a=>!a.startsWith('-'));
  if(!url) return { output:'curl: no URL specified',isError:true };
  if(url.includes('wttr.in')) return { output:`Weather for ${url.split('/').pop()||'your location'}:\n  Sunny +24°C  Wind: 12km/h NW  Humidity: 45%` };
  if(url.includes('ipinfo.io')||url.includes('icanhazip')) return { output:'203.0.113.42' };
  return { output:`curl: (6) Could not resolve host: ${url.replace(/https?:\/\//,'')}\n(simulated — no real network access)`,isError:true };
}

function cmdWget(args){
  const url=args.find(a=>!a.startsWith('-'));
  if(!url) return { output:'wget: missing URL',isError:true };
  const fname=url.split('/').pop()||'index.html';
  return { output:`--${new Date().toISOString().slice(0,19).replace('T',' ')}--  ${url}\nResolving ${url.split('/')[2]}... failed: Name or service not known.\nwget: unable to resolve host address '${url.split('/')[2]}'\n(simulated — no real network access)`,isError:true };
}

function cmdIp(args){
  const sub=args[0];
  if(sub==='addr'||sub==='a') return { output:`1: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536\n    link/loopback 00:00:00:00:00:00 brd 00:00:00:00:00:00\n    inet 127.0.0.1/8 scope host lo\n2: wlan0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500\n    link/ether aa:bb:cc:dd:ee:ff brd ff:ff:ff:ff:ff:ff\n    inet 192.168.1.42/24 brd 192.168.1.255 scope global wlan0` };
  if(sub==='route'||sub==='r') return { output:`default via 192.168.1.1 dev wlan0 proto dhcp metric 600\n192.168.1.0/24 dev wlan0 proto kernel scope link src 192.168.1.42` };
  if(sub==='link'||sub==='l') return { output:`1: lo: <LOOPBACK,UP,LOWER_UP> mtu 65536 qdisc noqueue state UNKNOWN\n2: wlan0: <BROADCAST,MULTICAST,UP,LOWER_UP> mtu 1500 qdisc noqueue state UP` };
  return { output:'usage: ip [addr|route|link]' };
}

function cmdGrep(args){
  const flags=args.filter(a=>a.startsWith('-')).join('');
  const pattern=args.find(a=>!a.startsWith('-'));
  const file=args.filter(a=>!a.startsWith('-'))[1];
  if(!pattern) return { output:'usage: grep [options] PATTERN [FILE]',isError:true };
  if(!file) return { output:'grep: no file specified',isError:true };
  const node=getNode(resolvePath(file));
  if(!node||node.type==='dir') return { output:`grep: ${file}: No such file or directory`,isError:true };
  const lines=(node.content??'').split('\n');
  const ci=flags.includes('i');
  const re=new RegExp(pattern,ci?'i':'');
  const matched=lines.filter(l=>re.test(l));
  if(!matched.length) return { output:'',isError:true };
  return { output:matched.map(l=>l.replace(new RegExp(pattern,'gi'),m=>`\x1b[31m${m}\x1b[0m`)).join('\n') };
}

function cmdWc(args){
  const file=args.find(a=>!a.startsWith('-'));
  if(!file) return { output:'wc: missing file operand',isError:true };
  const node=getNode(resolvePath(file));
  if(!node||node.type==='dir') return { output:`wc: ${file}: No such file or directory`,isError:true };
  const content=node.content??'';
  const lines=content.split('\n').length;
  const words=content.trim().split(/\s+/).filter(Boolean).length;
  const bytes=content.length;
  return { output:`  ${lines}   ${words}  ${bytes} ${file}` };
}

function cmdHead(args){
  const n=parseInt(args[args.indexOf('-n')+1])||10;
  const file=args.find(a=>!a.startsWith('-'));
  if(!file) return { output:'head: missing file operand',isError:true };
  const node=getNode(resolvePath(file));
  if(!node||node.type==='dir') return { output:`head: ${file}: No such file or directory`,isError:true };
  return { output:(node.content??'').split('\n').slice(0,n).join('\n') };
}

function cmdTail(args){
  const n=parseInt(args[args.indexOf('-n')+1])||10;
  const file=args.find(a=>!a.startsWith('-'));
  if(!file) return { output:'tail: missing file operand',isError:true };
  const node=getNode(resolvePath(file));
  if(!node||node.type==='dir') return { output:`tail: ${file}: No such file or directory`,isError:true };
  return { output:(node.content??'').split('\n').slice(-n).join('\n') };
}

function cmdSort(args){
  const file=args.find(a=>!a.startsWith('-'));
  if(!file) return { output:'sort: reading from stdin is not supported in this simulation',isError:true };
  const node=getNode(resolvePath(file));
  if(!node||node.type==='dir') return { output:`sort: ${file}: No such file or directory`,isError:true };
  const lines=(node.content??'').split('\n');
  const rev=args.includes('-r');
  return { output:lines.sort().concat(rev?[].reverse():[])[rev?'reverse':'map'](v=>v).join('\n') };
}

function cmdUniq(args){
  const file=args.find(a=>!a.startsWith('-'));
  if(!file) return { output:'uniq: reading from stdin not supported',isError:true };
  const node=getNode(resolvePath(file));
  if(!node) return { output:`uniq: ${file}: No such file or directory`,isError:true };
  const lines=(node.content??'').split('\n');
  return { output:lines.filter((l,i)=>l!==lines[i-1]).join('\n') };
}

function cmdDiff(args){
  const [f1,f2]=args.filter(a=>!a.startsWith('-'));
  if(!f1||!f2) return { output:'diff: missing operand',isError:true };
  const n1=getNode(resolvePath(f1)), n2=getNode(resolvePath(f2));
  if(!n1) return { output:`diff: ${f1}: No such file or directory`,isError:true };
  if(!n2) return { output:`diff: ${f2}: No such file or directory`,isError:true };
  if(n1.content===n2.content) return { output:'' };
  return { output:`--- ${f1}\n+++ ${f2}\n@@ -1 +1 @@\n-${(n1.content??'').split('\n')[0]}\n+${(n2.content??'').split('\n')[0]}` };
}

function cmdFind(args){
  const path=args.find(a=>!a.startsWith('-'))??'.';
  const name=args[args.indexOf('-name')+1];
  const node=getNode(resolvePath(path));
  if(!node) return { output:`find: '${path}': No such file or directory`,isError:true };
  const results=[];
  function walk(n,p){ if(!n.children) return; for(const [k,v] of Object.entries(n.children)){ const fp=p+'/'+k; if(!name||k.includes(name.replace(/\*/g,''))) results.push(fp); if(v.type==='dir') walk(v,fp); }}
  walk(node, path==='.'?'.':formatPath(resolvePath(path)));
  return { output:results.join('\n')||'' };
}

function cmdKill(args){
  const pid=args.find(a=>!a.startsWith('-'));
  if(!pid) return { output:'kill: usage: kill [-s sigspec | -n signum] pid',isError:true };
  if(pid==='1234') return { output:`kill: (1234): Operation not permitted`,isError:true };
  return { output:'' };
}

function cmdKillall(args){
  const name=args[0];
  if(!name) return { output:'killall: no process name specified',isError:true };
  return { output:`${name}: no process found`,isError:true };
}

function cmdGit(args){
  const sub=args[0];
  if(!sub) return { output:'usage: git [--version] [--help] <command> [<args>]' };
  if(sub==='--version') return { output:'git version 2.45.2' };
  if(sub==='init') return { output:`Initialized empty Git repository in ${formatPath(STATE.currentPath)}/.git/` };
  if(sub==='status') return { output:`On branch main\nYour branch is up to date with 'origin/main'.\n\nnothing to commit, working tree clean` };

  if(sub==='diff') return { output:`diff --git a/src/main.ts b/src/main.ts\nindex a3f8d2e..b2e9c1d 100644\n--- a/src/main.ts\n+++ b/src/main.ts\n@@ -12,7 +12,7 @@\n-  const result = oldFunction();\n+  const result = newFunction();\n   return result;` };

function cmdLn(args){
  const s=args.find(a=>!a.startsWith('-')), t=args.filter(a=>!a.startsWith('-'))[1];
  if(!s||!t) return { output:'ln: missing file operand',isError:true };
  const src=getNode(resolvePath(s));
  if(!src) return { output:`ln: failed to access '${s}': No such file or directory`,isError:true };
  const parent=getNode(STATE.currentPath);
  if(parent?.children) parent.children[t]={ ...src };
  return { output:'' };
}

function cmdCp(args){
  const files=args.filter(a=>!a.startsWith('-'));
  if(files.length<2) return { output:'cp: missing destination file operand',isError:true };
  const [src,dst]=files;
  const srcNode=getNode(resolvePath(src));
  if(!srcNode) return { output:`cp: cannot stat '${src}': No such file or directory`,isError:true };
  const parent=getNode(STATE.currentPath);
  if(parent?.children) parent.children[dst]={ ...srcNode, children:srcNode.children?{...srcNode.children}:undefined };
  return { output:'' };
}

function cmdMv(args){
  const files=args.filter(a=>!a.startsWith('-'));
  if(files.length<2) return { output:'mv: missing destination file operand',isError:true };
  const [src,dst]=files;
  const parent=getNode(STATE.currentPath);
  if(!parent?.children?.[src]) return { output:`mv: cannot stat '${src}': No such file or directory`,isError:true };
  parent.children[dst]={...parent.children[src]};
  delete parent.children[src];
  return { output:'' };
}

function cmdDu(args){
  const target=args.find(a=>!a.startsWith('-'))??'.';
  const node=getNode(resolvePath(target));
  if(!node) return { output:`du: cannot access '${target}': No such file or directory`,isError:true };
  function size(n){ if(n.type==='file') return n.size??0; return Object.values(n.children??{}).reduce((a,c)=>a+size(c),4096); }
  return { output:`${Math.ceil(size(node)/1024)}\t${target}` };
}

function cmdStat(args){
  const file=args[0];
  if(!file) return { output:'stat: missing operand',isError:true };
  const node=getNode(resolvePath(file));
  if(!node) return { output:`stat: cannot stat '${file}': No such file or directory`,isError:true };
  const sz=node.size??(node.type==='dir'?4096:0);
  return { output:`  File: ${file}\n  Size: ${sz}\t\tBlocks: ${Math.ceil(sz/512)}\t IO Block: 4096\t ${node.type==='dir'?'directory':'regular file'}\nDevice: 259,2\t\tInode: ${Math.floor(Math.random()*999999+100000)}\tLinks: 1\nAccess: (0644/${node.type==='dir'?'drwxr-xr-x':'-rw-r--r--'})\tUid: (1000/user)\tGid: (1000/user)\nModify: ${node.modified??'2024-06-14 09:22:14.000000000 +0000'}` };
}

function cmdFile(args){
  const file=args[0];
  if(!file) return { output:'file: missing operand',isError:true };
  const node=getNode(resolvePath(file));
  if(!node) return { output:`file: ${file}: No such file or directory`,isError:true };
  if(node.type==='dir') return { output:`${file}: directory` };
  if(file.endsWith('.sh')) return { output:`${file}: Bourne-Again shell script, ASCII text executable` };
  if(file.endsWith('.py')) return { output:`${file}: Python script, ASCII text executable` };
  if(file.endsWith('.md')) return { output:`${file}: ASCII text` };
  if(file.endsWith('.conf')||file.endsWith('.lua')||file.endsWith('.ts')) return { output:`${file}: ASCII text` };
  return { output:`${file}: ASCII text` };
}

function cmdTar(args){
  const flags=args.filter(a=>a.startsWith('-')).join('').replace(/-/g,'');
  const files=args.filter(a=>!a.startsWith('-'));
  if(flags.includes('x')) return { output:files[0]?`x ${files[1]??'file1'}\nx ${files[1]??'file2'}`:'tar: missing archive operand',isError:!files[0] };
  if(flags.includes('c')) return { output:files[0]?`a ${files.slice(1).join('\na ')||'(no files)'}`:'tar: need to specify an archive',isError:!files[0] };
  if(flags.includes('t')) return { output:files[0]?`./\n./README.md\n./src/\n./src/main.ts`:'tar: missing archive operand',isError:!files[0] };
  return { output:'usage: tar [-c|-x|-t] [-f archive] [files...]' };
}

function cmdSeq(args){
  const nums=args.map(Number).filter(n=>!isNaN(n));
  if(!nums.length) return { output:'seq: missing operand',isError:true };
  let [start,step,end]=nums.length===1?[1,1,nums[0]]:nums.length===2?[nums[0],1,nums[1]]:[nums[0],nums[1],nums[2]];
  const out=[];
  for(let i=start;step>0?i<=end:i>=end;i+=step) out.push(i);
  return { output:out.slice(0,200).join('\n') };
}

function cmdBase64(args){
  const decode=args.includes('-d');
  const input=args.find(a=>!a.startsWith('-'));
  if(!input) return { output:'base64: missing operand',isError:true };
  try{
    if(decode) return { output:atob(input) };
    return { output:btoa(input) };
  }catch{ return { output:'base64: invalid input',isError:true }; }
}

function cmdBc(args){
  const expr=args.join(' ');
  if(!expr) return { output:'bc: interactive mode not supported. Usage: bc <expression>' };
  try{
    // safe eval of math only
    const safe=expr.replace(/[^0-9+\-*/().\s%]/g,'');
    if(!safe.trim()) return { output:'0' };
    // eslint-disable-next-line no-new-func
    const result=Function(`"use strict"; return (${safe})`)();
    return { output:String(result) };
  }catch{ return { output:'(standard_in) 1: syntax error',isError:true }; }
}

function cmdFactor(args){
  const n=parseInt(args[0]);
  if(isNaN(n)||n<2) return { output:'factor: argument must be a positive integer >= 2',isError:true };
  const factors=[];
  let d=2, m=n;
  while(d*d<=m){ while(m%d===0){ factors.push(d); m/=d; } d++; }
  if(m>1) factors.push(m);
  return { output:`${n}: ${factors.join(' ')}` };
}

function cmdAlias(args){
  const aliases={ ls:"ls --color=auto", ll:"ls -la", la:"ls -la", grep:"grep --color=auto", vi:"nvim", vim:"nvim" };
  if(!args.length) return { output:Object.entries(aliases).map(([k,v])=>`alias ${k}='${v}'`).join('\n') };
  const [name,val]=args[0].split('=');
  if(val) return { output:'' };
  return { output:aliases[name]?`alias ${name}='${aliases[name]}'`:`bash: alias: ${name}: not found`,isError:!aliases[name] };
}

function cmdTree(args){
  const target=args.find(a=>!a.startsWith('-'))??'.';
  const node=getNode(resolvePath(target));
  if(!node||node.type==='file') return { output:`tree: ${target}: Not a directory`,isError:true };
  let out=''; let dirs=0; let files=0;
  function walk(n,prefix){
    if(!n.children) return;
    const entries=Object.entries(n.children);
    entries.forEach(([name,child],i)=>{
      const last=i===entries.length-1;
      const connector=last?'└── ':'├── ';
      const childPrefix=prefix+(last?'    '+'   ':'│   ');
      if(child.type==='dir'){ out+=`${prefix}${connector}<span class="ls-dir">${esc(name)}</span>\n`; dirs++; walk(child,childPrefix); }
      else { out+=`${prefix}${connector}<span class="ls-file">${esc(name)}</span>\n`; files++; }
    });
  }
  out+=`<span class="ls-dir">${target}</span>\n`;
  walk(node,'');
  out+=`\n${dirs} director${dirs===1?'y':'ies'}, ${files} file${files===1?'':'s'}`;
  return { output:out, isHtml:true };
}

function cmdCal(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const monthNames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();
  let out=`    ${monthNames[month]} ${year}\nSu Mo Tu We Th Fr Sa\n`;
  let day=1-firstDay;
  for(let row=0;row<6;row++){
    let line='';
    for(let col=0;col<7;col++){
      if(day<1||day>daysInMonth) line+='   ';
      else if(day===now.getDate()) line+=`\x1b[7m${String(day).padStart(2)}\x1b[0m `;
      else line+=String(day).padStart(2)+' ';
      day++;
    }
    out+=line.trimEnd()+'\n';
    if(day>daysInMonth) break;
  }
  return { output:out.trimEnd() };
}

function cmdPs(args){
  if(args.some(a=>a.includes('a'))) return { output:'USER         PID %CPU %MEM    VSZ   RSS TTY      STAT START   TIME COMMAND\nuser        1234  0.0  0.1  15432  9812 pts/0    Ss   09:00   0:00 /bin/bash\nuser        2341  0.8  2.1 685432 86440 pts/0   Sl   09:05   0:12 /usr/bin/node\nuser        3891  0.0  0.0   8256  4096 pts/0   R+   10:42   0:00 ps aux' };
  return { output:'  PID TTY          TIME CMD\n 1234 pts/0    00:00:00 bash\n 5678 pts/0    00:00:00 ps' };
}

function cmdWhich(args){
  const map={bash:'/usr/bin/bash',ls:'/usr/bin/ls',cat:'/usr/bin/cat',rm:'/usr/bin/rm',mkdir:'/usr/bin/mkdir',touch:'/usr/bin/touch',echo:'/usr/bin/echo',pwd:'/usr/bin/pwd',pacman:'/usr/bin/pacman',neofetch:'/usr/bin/neofetch',sudo:'/usr/bin/sudo',which:'/usr/bin/which',git:'/usr/bin/git',nvim:'/usr/bin/nvim',python:'/usr/bin/python',node:'/usr/bin/node',npm:'/usr/bin/npm',curl:'/usr/bin/curl',wget:'/usr/bin/wget',htop:'/usr/bin/htop'};
  if(!args[0]) return { output:'which: missing argument',isError:true };
  return map[args[0]]?{output:map[args[0]]}:{output:`which: no ${args[0]} in (/usr/local/sbin:/usr/local/bin:/usr/bin:/usr/sbin:/sbin:/bin)`,isError:true};
}

function cmdLs(args){
  const long=args.some(a=>a.startsWith('-')&&a.includes('l'));
  const hidden=args.some(a=>a.startsWith('-')&&a.includes('a'));
  const target=args.find(a=>!a.startsWith('-'))??'.';
  const node=getNode(resolvePath(target));
  if(!node) return { output:`ls: cannot access '${target}': No such file or directory`,isError:true };
  if(node.type==='file') return { output:target };
  if(!node.children) return { output:'' };
  return { output:lsFormat(node.children,long||hidden,hidden),isHtml:true };
}

function cmdCd(args){
  const target=args[0]??'~';
  const path=resolvePath(target);
  const node=getNode(path);
  if(!node) return { output:`cd: ${target}: No such file or directory`,isError:true };
  if(node.type!=='dir') return { output:`cd: ${target}: Not a directory`,isError:true };
  STATE.currentPath=path; updateInputPrompt(); return { output:'' };
}

function cmdCat(args){
  if(!args[0]) return { output:'cat: missing operand',isError:true };
  const node=getNode(resolvePath(args[0]));
  if(!node) return { output:`cat: ${args[0]}: No such file or directory`,isError:true };
  if(node.type==='dir') return { output:`cat: ${args[0]}: Is a directory`,isError:true };
  return { output:node.content??'' };
}

function cmdTouch(args){
  if(!args[0]) return { output:'touch: missing file operand',isError:true };
  for(const name of args){
    const parent=getNode(STATE.currentPath);
    if(parent?.children&&!parent.children[name])
      parent.children[name]={ type:'file',content:'',size:0,modified:'Jun 14 '+new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}) };
  }
  return { output:'' };
}

function cmdMkdir(args){
  if(!args[0]) return { output:'mkdir: missing operand',isError:true };
  const name=args.find(a=>!a.startsWith('-'));
  if(!name) return { output:'mkdir: missing operand',isError:true };
  const parent=getNode(STATE.currentPath);
  if(!parent?.children) return { output:`mkdir: cannot create directory '${name}': Permission denied`,isError:true };
  if(parent.children[name]) return { output:`mkdir: cannot create directory '${name}': File exists`,isError:true };
  parent.children[name]={ type:'dir',children:{} }; return { output:'' };
}

function cmdRm(args){
  const recursive=args.some(a=>a.startsWith('-')&&a.includes('r'));
  const target=args.find(a=>!a.startsWith('-'));
  if(!target) return { output:'rm: missing operand',isError:true };
  if(target==='/'||target==='~') return { output:`rm: refusing to remove '${target}': protected path`,isError:true };
  const parent=getNode(STATE.currentPath);
  if(!parent?.children?.[target]) return { output:`rm: cannot remove '${target}': No such file or directory`,isError:true };
  if(parent.children[target].type==='dir'&&!recursive) return { output:`rm: cannot remove '${target}': Is a directory`,isError:true };
  delete parent.children[target]; return { output:'' };
}

function cmdPacman(args, isSudo){
  const flag=args[0];
  const pkgs=args.slice(1).filter(a=>!a.startsWith('-'));

  if(['-Syu','-Syyu','-Syy'].includes(flag)){
    if(!isSudo) return { output:'error: you cannot perform this operation unless you are root.',isError:true };
    return { delay:1200, output:':: Synchronizing package databases...\n core                                    148.8 KiB  1.23 MiB/s 00:00 [###################] 100%\n extra                                  8.85 MiB   8.92 MiB/s 00:01 [###################] 100%\n multilib                              171.1 KiB   2.34 MiB/s 00:00 [###################] 100%\n:: Starting full system upgrade...\n there is nothing to do' };
  }

  if(flag==='-S'){
    if(!isSudo) return { output:'error: you cannot perform this operation unless you are root.',isError:true };
    if(!pkgs.length) return { output:'error: no targets specified (use -h for help)',isError:true };
    const pkg=pkgs[0];
    const ver=`1.${Math.floor(Math.random()*9)}.${Math.floor(Math.random()*20)}-1`;
    const reinstall=STATE.installedPackages.includes(pkg);
    if(!reinstall) STATE.installedPackages.push(pkg);
    return { delay:900+(Math.random()*400|0), output:reinstall
      ?`warning: ${pkg} is up to date -- reinstalling\n\nPackages (1) ${pkg}-${ver}\n\nTotal Installed Size:  2.34 MiB\n\n:: Proceed with installation? [Y/n] Y\n(1/1) installing ${pkg}                          [#####################] 100%`
      :`resolving dependencies...\nlooking for conflicting packages...\n\nPackages (1) ${pkg}-${ver}\n\nTotal Download Size:    1.23 MiB\nTotal Installed Size:   2.34 MiB\n\n:: Proceed with installation? [Y/n] Y\n:: Retrieving packages...\n ${pkg}-${ver}     1.2 MiB   4.56 MiB/s 00:00 [#####################] 100%\n(1/1) checking keys in keyring               [#####################] 100%\n(1/1) checking package integrity             [#####################] 100%\n(1/1) installing ${pkg}                      [#####################] 100%`
    };
  }

  if(['-R','-Rs','-Rns'].includes(flag)){
    if(!isSudo) return { output:'error: you cannot perform this operation unless you are root.',isError:true };
    if(!pkgs.length) return { output:'error: no targets specified',isError:true };
    const pkg=pkgs[0];
    if(!STATE.installedPackages.includes(pkg)) return { output:`error: target not found: ${pkg}`,isError:true };
    STATE.installedPackages=STATE.installedPackages.filter(p=>p!==pkg);
    return { delay:600, output:`checking dependencies...\n\nPackages (1) ${pkg}\n\nTotal Removed Size:  2.34 MiB\n\n:: Do you want to remove these packages? [Y/n] Y\n(1/1) removing ${pkg}                       [#####################] 100%` };
  }

  if(['-Q','-Qi'].includes(flag)){
    if(pkgs.length){
      const pkg=pkgs[0];
      if(!STATE.installedPackages.includes(pkg)) return { output:`error: package '${pkg}' was not found`,isError:true };
      return { output:`Name            : ${pkg}\nVersion         : 1.0.0-1\nDescription     : ${pkg} package for Arch Linux\nArchitecture    : x86_64\nURL             : https://archlinux.org\nLicenses        : GPL\nInstall Date    : Sat 14 Jun 2024 09:00:00 AM UTC\nInstall Reason  : Explicitly installed` };
    }
    return { output:STATE.installedPackages.map(p=>`${p} 1.0.0-1`).join('\n') };
  }

  if(['-Ss','-Qs'].includes(flag)){
    const q=pkgs[0]??'';
    const hits=STATE.installedPackages.filter(p=>p.includes(q));
    if(!hits.length) return { output:'' };
    return { output:hits.map(p=>`extra/${p} 1.0.0-1 [installed]\n    ${p} package for Arch Linux`).join('\n') };
  }

  return { output:'usage:  pacman <operation> [...]\noperations:\n    pacman {-S}    install\n    pacman {-R}    remove\n    pacman {-Syu}  upgrade system\n    pacman {-Q}    list installed\n    pacman {-Ss}   search' };
}

/* ═══════════════════════════════════════════
   INPUT
═══════════════════════════════════════════ */
async function handleEnter(){
  const raw=inputField.value;
  inputField.value='';

  if(STATE.awaitingPassword){
    appendPromptLine(raw,true);
    STATE.awaitingPassword=false; updateInputPrompt();
    if(raw==='admin'){
      STATE.sudoAuthenticated=true;
      clearTimeout(STATE.sudoTimeout);
      STATE.sudoTimeout=setTimeout(()=>{STATE.sudoAuthenticated=false;},5*60*1000);
      appendLine('','');
      const result=runCommand(STATE.pendingSudo,true);
      STATE.pendingSudo=null;
      await renderResult(result);
    } else {
      STATE.pendingSudo=null;
      appendLine('Sorry, try again.','error');
      appendLine('sudo: 1 incorrect password attempt','error');
    }
    return;
  }

  if(raw.trim()){ STATE.history.push(raw.trim()); STATE.historyIndex=STATE.history.length; }
  appendPromptLine(raw,false);
  const result=runCommand(raw);
  if(!result) return;
  if(result.requiresPassword){ STATE.pendingSudo=result.cmd; STATE.awaitingPassword=true; updateInputPrompt(); return; }
  await renderResult(result);
}

async function renderResult(result){
  if(!result) return;
  if(result.output==='__CLEAR__'){ clearTerminal(); return; }
  if(result.delay) await delay(result.delay);
  if(result.output) appendLine(result.output,result.isError?'error':'',result.isHtml??false);
}

inputField.addEventListener('keydown',async e=>{
  if(BOOTING){ e.preventDefault(); return; }
  if(e.key==='Enter'){ e.preventDefault(); await handleEnter(); return; }
  if(e.key==='ArrowUp'){ e.preventDefault(); if(!STATE.history.length) return; STATE.historyIndex=Math.max(0,STATE.historyIndex-1); inputField.value=STATE.history[STATE.historyIndex]??''; setTimeout(()=>inputField.setSelectionRange(inputField.value.length,inputField.value.length),0); return; }
  if(e.key==='ArrowDown'){ e.preventDefault(); STATE.historyIndex=Math.min(STATE.history.length,STATE.historyIndex+1); inputField.value=STATE.historyIndex===STATE.history.length?'':STATE.history[STATE.historyIndex]; return; }
  if(e.key==='l'&&e.ctrlKey){ e.preventDefault(); clearTerminal(); return; }
  if(e.key==='c'&&e.ctrlKey){ e.preventDefault(); appendPromptLine(inputField.value+'^C',false); inputField.value=''; STATE.awaitingPassword=false; STATE.pendingSudo=null; updateInputPrompt(); return; }
  if(e.key==='Tab'){
    e.preventDefault();
    const parts=inputField.value.split(/\s+/);
    if(parts.length>=2){
      const partial=parts[parts.length-1];
      const parent=getNode(STATE.currentPath);
      if(parent?.children){
        const matches=Object.keys(parent.children).filter(n=>n.startsWith(partial));
        if(matches.length===1){ parts[parts.length-1]=matches[0]+(parent.children[matches[0]].type==='dir'?'/':''); inputField.value=parts.join(' '); }
      }
    }
  }
});

document.getElementById('terminal-screen').addEventListener('click',()=>{ if(!BOOTING) inputField.focus(); });
</script>
